---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: apuestasservice-deployment
    namespace: mundial2026
    labels:
      app: apuestasservice
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: apuestasservice
    template:
      metadata:
        labels:
          app: apuestasservice
      spec:
        serviceAccountName: k8sserviceaccount
        containers:
        - name: apuestasservice
          image: us-central1-docker.pkg.dev/mundial2026-481712/mundial2026/apuestasservice:2.0.9
          ports:
          - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
            limits:
              cpu: "100m"          
---
  apiVersion: v1
  kind: Service
  metadata:
    name: apuestasservice
    namespace: mundial2026
    labels:
      app: apuestasservice
  spec:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
    selector:
      app: apuestasservice