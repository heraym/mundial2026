---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: equiposservice-deployment
    namespace: mundial2026
    labels:
      app: equiposservice
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: equiposservice
    template:
      metadata:
        labels:
          app: equiposservice
      spec:
        serviceAccountName: k8sserviceaccount
        nodeSelector:
          iam.gke.io/gke-metadata-server-enabled: "true" 
        containers:
        - name: equiposservice
          image: us-central1-docker.pkg.dev/mundial2026-481712/mundial2026/equiposservice:2.0.0
          ports:
          - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
            limits:
              cpu: "100m"         
---
  apiVersion: v1
  kind: Service
  metadata:
    name: equiposservice
    namespace: mundial2026
    labels:
      app: equiposservice
  spec:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
    selector:
      app: equiposservice