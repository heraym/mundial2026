---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: mundial2026-backend-deployment
    namespace: mundial2026
    labels:
      app: mundial2026-backend
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: mundial2026-backend
    template:
      metadata:
        labels:
          app: mundial2026-backend
      spec:
        serviceAccountName: k8sserviceaccount
        nodeSelector:
          iam.gke.io/gke-metadata-server-enabled: "true" 
        containers:
        - name: mundial2026-backend
          image: us-central1-docker.pkg.dev/mundial2026-481712/mundial2026/mundial2026_backend:2.0.1
          ports:
          - containerPort: 8080
          resources:
            requests:
              cpu: "250m"           
---
  apiVersion: v1
  kind: Service
  metadata:
    name: mundial2026-backend-svc
    namespace: mundial2026
    annotations:
      cloud.google.com/neg: '{"ingress": true}'
    labels:
      app: mundial2026-backend
  spec:
    type: NodePort
    ports:
      - port: 80
        targetPort: 8080
    selector:
      app: mundial2026-backend              
---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    namespace: mundial2026
    name: mundial2026-backend-ingress
    annotations:   
      kubernetes.io/ingress.class: "gce"
  spec:
    defaultBackend:
      service:
        name: mundial2026-backend-svc
        port:
            number: 80      