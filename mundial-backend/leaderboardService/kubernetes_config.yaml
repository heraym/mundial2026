---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: leaderboardservice-deployment
    namespace: mundial2026
    labels:
      app: leaderboardservice
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: leaderboardservice
    template:
      metadata:
        labels:
          app: leaderboardservice
      spec:
        serviceAccountName: k8sserviceaccount
        containers:
        - name: leaderboardservice
          image: us-central1-docker.pkg.dev/mundial2026-481712/mundial2026/leaderboardservice:2.0.1
          ports:
          - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
            limits:
              cpu: "100m"         
---
  apiVersion: v1
  kind: Service
  metadata:
    name: leaderboardservice
    namespace: mundial2026
    labels:
      app: leaderboardservice
  spec:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
    selector:
      app: leaderboardservice