---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: usuariosservice-deployment
    namespace: mundial2026
    labels:
      app: usuariosservice
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: usuariosservice
    template:
      metadata:
        labels:
          app: usuariosservice
      spec:
        serviceAccountName: k8sserviceaccount
        containers:
        - name: usuariosservice
          image: us-central1-docker.pkg.dev/mundial2026-481712/mundial2026/usuariosservice:2.0.0
          ports:
          - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
            limits:
              cpu: "100m"          
---
  apiVersion: v1
  kind: Service
  metadata:
    name: usuariosservice
    namespace: mundial2026
    labels:
      app: usuariosservice
  spec:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
    selector:
      app: usuariosservice