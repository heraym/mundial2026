server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso hacia el backend para todas las llamadas de la API (incluyendo pendientes)
    location ~ ^/(usuarios|usuario|apuestas|apuesta|partidos|leaderboard|equipos|grupos|pendientes) {
        proxy_pass ${BACKEND_URL};
        
        # Desactivar validación estricta de SSL para soportar certificados auto-firmados o balanceadores
        proxy_ssl_verify off;
        
        # Forzar SNI correcto para evitar fallos de handshake al usar IPs o subdominios
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        
        # Seteo de cabeceras seguras para el paso del proxy
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Compresión Gzip para optimizar la velocidad de carga
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";
}
