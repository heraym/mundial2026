server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Disable caching for index.html so the browser always loads the newest version
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache static assets (JS, CSS, images, fonts) since they have unique hashes in production
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Proxy inverso hacia el backend en GKE para todas las llamadas de la API
    location ~ ^/(usuarios|apuestas|apuesta|partidos|leaderboard|equipos|grupos) {
        proxy_pass ${BACKEND_URL};
        
        # Desactivar validación estricta de SSL para soportar certificados auto-firmados
        proxy_ssl_verify off;
        
        # Forzar SNI correcto para evitar que el handshake falle al usar IPs desnudas
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        
        # Usar $proxy_host como Host para que GKE Ingress reconozca la IP de destino
        # y no falle con errores 404/502 al recibir el dominio de Cloud Run.
        proxy_set_header Host $proxy_host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Compresión Gzip para optimizar velocidad de carga
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";
}
